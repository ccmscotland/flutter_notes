name: flutter_notes
description: A hierarchical note-taking app with rich text, tables, ink drawing, and cloud sync.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_quill: ^11.5.0
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.3
  path: ^1.9.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.4.0
  go_router: ^14.2.0
  google_sign_in: ^6.2.1
  googleapis: ^13.1.0
  http: ^1.2.1
  msal_flutter: ^2.0.1
  uuid: ^4.4.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  image_picker: ^1.1.2
  flutter_colorpicker: ^1.1.0
  intl: ^0.20.0
  crypto: ^3.0.3
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.0.3
  share_plus: ^10.0.0
  pdf: ^3.11.0
  archive: ^3.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 48
